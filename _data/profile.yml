short_bio: >-
  <p>
    I graduated in Computer Science and Engineering from North South University, Bangladesh, and currently work as an Advanced Artificial Intelligence Trainer at Invisible Technologies Inc. In my role, I work on teaching Large Language Models (LLM) to focus on the minute details and nuances present in video and audio. This not only advances the proficiency of foundation models but also plays a crucial role in shaping the trajectory of visual media for the future.
  </p>
  <p>
    My research interest lies at the intersection of AI and healthcare, where I aim to explore innovative solutions to improve patient outcomes and advance medical technologies. 
    I previously worked under <a href="http://ece.northsouth.edu/people/dr-shahnewaz-siddique/" target="_blank">Dr. Shahnewaz Siddique</a> with a goal to develop and refine deep learning systems for medical imaging applications. Our research also focused on ensuring secure transfer of clinical data.
  </p>
  <p>
    I am currently working on 2D image-based drug discovery methods for Dengue treatment. The project aims to accelerate the drug discovery process by utilizing visual representations of molecular structures to predict their effectiveness. 
    This research is supervised by <a href="https://sites.google.com/site/tanzilctg/" target="_blank">Dr. Tanzilur Rahman</a>, and it holds promise for contributing to the global effort to combat Dengue.
  </p>


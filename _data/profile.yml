short_bio: >-
  <p>
    I graduated in Computer Science and Engineering from North South University, Bangladesh, and currently work as an Intermediate Artificial Intelligence Trainer at Invisible Technologies Inc. In my role, I work on teaching Large Language Models (LLM) to focus on the minute details and nuances present in video and audio. This not only advances the proficiency of foundation models but also plays a crucial role in shaping the trajectory of visual media for the future.
  </p>
  <p>
    My research interest lies at the intersection of AI and healthcare, where I aim to explore innovative solutions to improve patient outcomes and advance medical technologies. 
    I previously worked under Dr Shahnewaz Siddique with a goal to develop and refine deep learning systems for medical imaging applications. Our research also focused on ensuring secure transfer of clinical data.
  </p>

